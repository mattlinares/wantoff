services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mealmate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mealmate}
      POSTGRES_DB: ${POSTGRES_DB:-mealmate}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
